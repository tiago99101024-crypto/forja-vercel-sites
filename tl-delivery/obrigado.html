<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado — Tiago Lian</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Tracking slots -->
  <!-- META PIXEL: PageView + Lead event aqui -->
  <!-- GTM: dataLayer.push({ event: 'lead_whatsapp' }) -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #FF4D00;
      --dark: #0A0A0A;
      --dark2: #141414;
      --gray: #888;
      --white: #FFFFFF;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: rgba(37,211,102,0.12);
      border: 1px solid rgba(37,211,102,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .icon svg { width: 32px; height: 32px; color: #25D366; }
    h1 {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 16px;
      line-height: 1.2;
    }
    h1 span { color: var(--brand); }
    p {
      font-size: 16px;
      color: #AAAAAA;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .btn-whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #25D366;
      color: var(--white);
      padding: 18px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(37,211,102,0.3);
    }
    .btn-whatsapp:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(37,211,102,0.4);
    }
    .btn-whatsapp svg { width: 22px; height: 22px; flex-shrink: 0; }
    .back {
      margin-top: 24px;
      font-size: 14px;
      color: var(--gray);
    }
    .back a { color: var(--brand); text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <h1>Mensagem <span>enviada.</span></h1>
  <p>Recebi seu contato e respondo em até 2h em dias úteis. Enquanto isso, se quiser falar direto, é só clicar abaixo.</p>

</div>

</html>
